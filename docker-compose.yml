services:
  api:
    build: ./apps/api
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      GEMINI_FAST_MODEL: ${GEMINI_FAST_MODEL:-models/gemini-3.1-flash-lite}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-models/gemini-3.1-flash-image}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-4}
      GEMINI_MAX_CONCURRENCY: ${GEMINI_MAX_CONCURRENCY:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATA_ROOT: /workspace/data
      RUNTIME_ROOT: /workspace/runtime
    volumes:
      - ./data:/workspace/data:ro
      - runtime-data:/workspace/runtime
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  runtime-data:
